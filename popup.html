<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cloak sting</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <p class="eyebrow">cloak sting</p>
    <h1>latest threat receipt</h1>
    <section id="receipt" class="card muted">No receipt yet. Open a suspicious demo page.</section>
    <button id="copy">Copy receipt</button>
    <button id="viewScreenshot" class="screenshot-btn" style="display:none">View screenshot</button>
  </main>
  <div id="screenshotModal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Evidence screenshot</span>
        <button id="closeModal" class="modal-close">&times;</button>
      </div>
      <img id="screenshotImage" class="screenshot-img" alt="Evidence screenshot">
      <button id="exportScreenshot" class="export-btn">Export PNG</button>
    </div>
  </div>
  <script src="src/screenshotCapture.js"></script>
  <script src="src/popup.js"></script>
</body>
</html>
