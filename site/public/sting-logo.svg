<svg width="260" height="300" viewBox="0 0 260 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- STING — Stingray Logo (matching reference: wide flat diamond body, long tail) -->

  <!-- Stingray body — wide flat shape like a stealth bomber -->
  <path d="M130 30 C100 30 60 42 30 65 C10 80 3 95 8 108 C18 130 55 142 130 142 C205 142 242 130 252 108 C257 95 250 80 230 65 C200 42 160 30 130 30 Z" fill="#1a1a1a"/>

  <!-- Body curves (two lines from top-center curving outward) -->
  <path d="M130 50 C124 68 120 90 122 118 C123 126 125 133 127 140" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M130 50 C136 68 140 90 138 118 C137 126 135 133 133 140" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Eyes — small white dots near top -->
  <circle cx="115" cy="58" r="5" fill="white"/>
  <circle cx="145" cy="58" r="5" fill="white"/>

  <!-- Tail — long thin elegant curve -->
  <path d="M130 142 C130 160 131 185 133 210 C136 240 133 265 128 290" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
