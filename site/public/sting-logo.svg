<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sting — Stingray Logo Mark -->
  <!-- Created for UC Berkeley AI Hackathon 2026 -->

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#0f0f0f" stroke="#333" stroke-width="1"/>

  <!-- Stingray body — sleek diamond/kite shape -->
  <path d="M100 40 L160 100 L100 130 L40 100 Z" fill="#f5a623" opacity="0.9"/>

  <!-- Wing highlights -->
  <path d="M100 40 L160 100 L145 90 L100 50 Z" fill="#ffd666" opacity="0.5"/>
  <path d="M100 40 L40 100 L55 90 L100 50 Z" fill="#ffd666" opacity="0.5"/>

  <!-- Body center line -->
  <path d="M100 55 L100 130" stroke="#c7841a" stroke-width="1" opacity="0.4"/>

  <!-- Stingray tail -->
  <path d="M100 130 L101.5 155 L100 175 L98.5 155 Z" fill="#f5a623"/>

  <!-- Tail barb -->
  <path d="M100 155 L103 152 L100 175 L97 152 Z" fill="#c7841a"/>

  <!-- Eyes -->
  <circle cx="85" cy="85" r="6" fill="#0f0f0f"/>
  <circle cx="86.5" cy="83.5" r="2" fill="#faf6ed"/>
  <circle cx="115" cy="85" r="6" fill="#0f0f0f"/>
  <circle cx="116.5" cy="83.5" r="2" fill="#faf6ed"/>

  <!-- Inner shield shape (subtle) -->
  <path d="M100 52 L140 88 L100 120 L60 88 Z" stroke="#faf6ed" stroke-width="0.75" fill="none" opacity="0.2"/>
</svg>
